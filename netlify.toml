[build]
  command = "npm run build"
  publish = "dist"

# SPA 路由重定向
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 安全响应头
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# HTTPS 强制重定向（Netlify 自动处理）
[[redirects]]
  from = "http:///*"
  to = "https://:splat"
  status = 301
  force = true

# 缓存策略
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

